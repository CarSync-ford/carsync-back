spring:
  application:
    name: arquitetura-orientada-servicos-sprint1
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mvc:
    contentnegotiation:
      default-content-type: application/json
  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB
      max-request-size: 1MB
  flyway:
    enabled: true
  bcrypt:
    salt: ${BCRYPT_SALT}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES}
  issuer: ${JWT_ISSUER}

hmac:
  secret: ${HMAC_SECRET:}
  enabled: ${HMAC_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

