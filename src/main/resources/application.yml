spring:
  application:
    name: arquitetura-orientada-servicos-sprint1
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mvc:
    contentnegotiation:
      default-content-type: application/json
  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB
      max-request-size: 1MB
  flyway:
    enabled: true
  bcrypt:
    salt: ${BCRYPT_SALT:10}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0zMmJ5dGVzLW9yLW1vcmU=}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}
  issuer: ${JWT_ISSUER:carsync-auth}

