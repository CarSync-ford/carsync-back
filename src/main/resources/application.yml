spring:
  application:
    name: arquitetura-orientada-servicos-sprint1
  datasource:
    url: jdbc:h2:mem:fordchallenge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mvc:
    contentnegotiation:
      default-content-type: application/json
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html

