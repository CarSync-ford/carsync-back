spring:
  application:
    name: arquitetura-orientada-servicos-sprint1
  datasource:
    url: ${DB_URL:jdbc:h2:mem:fordchallenge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mvc:
    contentnegotiation:
      default-content-type: application/json
  flyway:
    enabled: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  bcrypt:
    salt: ${BCRYPT_SALT:10}

server:
  port: ${SERVER_PORT:8080}
springdoc:
  swagger-ui:
    path: /swagger-ui.html

