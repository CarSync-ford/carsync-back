spring:
  application:
    name: arquitetura-orientada-servicos-sprint1
  datasource:
    url: ${DB_URL:jdbc:h2:mem:fordchallenge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mvc:
    contentnegotiation:
      default-content-type: application/json
  flyway:
    enabled: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  bcrypt:
    salt: ${BCRYPT_SALT:10}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0zMmJ5dGVzLW9yLW1vcmU=}
  pre-auth-expiration-minutes: ${JWT_PRE_AUTH_EXPIRATION_MINUTES:30}
  issuer: ${JWT_ISSUER:carsync-auth}

