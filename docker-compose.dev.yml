services:
  claude: 
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-carsync
    volumes:
      - .:/app
    # IMPORTANTE: Para usar o Claude Code no modo interativo, 
    # o Docker Compose precisa destas duas linhas abaixo:
    stdin_open: true 
    tty: true
    # Variaveis para enganar o Claude e usar o LiteLLM/Ollama
    network_mode: "host"
    environment:
      - ANTHROPIC_BASE_URL=http://localhost:4000
      - ANTHROPIC_API_KEY=sk-ant-dummy
